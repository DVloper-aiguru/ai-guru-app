let currentSection = null;
let currentChapter = null;
let currentQuiz = null;
let quizIdx = 0, score = 0, selectedAns = null, answers = [];
let completed = JSON.parse(localStorage.getItem('aiguru_done') || '{}');

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  const backBtn = document.getElementById('backBtn');
  backBtn.style.display = id === 'home' ? 'none' : 'block';
  window.scrollTo(0, 0);
  updateProgress();
}

function updateProgress() {
  const total = DATA.sections.reduce((a,s) => a + s.chapters.length, 0);
  const done = Object.keys(completed).length;
  document.getElementById('progressLabel').textContent = done + '/' + total + ' ✅';
}

function goBack() {
  const active = document.querySelector('.page.active');
  if (!active) return;
  const id = active.id.replace('page-', '');
  if (id === 'section') showPage('home');
  else if (id === 'chapter') showPage('section');
  else if (id === 'quiz' || id === 'result') showPage('chapter');
  else showPage('home');
}

function openSection(secId) {
  currentSection = DATA.sections.find(s => s.id === secId);
  if (!currentSection) return;
  const header = document.getElementById('sectionHeader');
  header.innerHTML = `
    <div style="font-size:44px">${currentSection.emoji}</div>
    <div>
      <div style="color:${currentSection.color};font-size:12px;font-weight:600;margin-bottom:2px">AI Guru · Section</div>
      <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px">${currentSection.name}</h2>
      <div style="color:#ffffff;font-size:13px">${currentSection.desc}</div>
    </div>`;
  const list = document.getElementById('topicList');
  list.innerHTML = currentSection.chapters.map((ch, i) => {
    const key = `${currentSection.id}-${i}`;
    const done = completed[key];
    return `<div class="hov" onclick="openChapter(${i})" style="background:${done ? currentSection.color + '12' : 'rgba(255,255,255,.04)'};border:1px solid ${done ? currentSection.border : 'rgba(255,255,255,.09)'};border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:10px">
      <div style="background:${currentSection.color}22;color:${currentSection.color};border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;min-width:36px">${i+1}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:14px">${ch.emoji} ${ch.title}</div>
        <div style="color:#ffffff;font-size:12px;margin-top:2px">Notes + Quiz included</div>
      </div>
      <span style="color:${done ? '#00C864' : 'rgba(255,255,255,.2)'};font-size:18px">${done ? '✅' : '›'}</span>
    </div>`;
  }).join('');
  showPage('section');
}

function openChapter(idx) {
  currentChapter = currentSection.chapters[idx];
  currentChapter._idx = idx;
  const c = document.getElementById('chapterContent');
  const col = currentSection.color;
  c.innerHTML = `
    <div style="background:${currentSection.bg};border:1px solid ${currentSection.border};border-radius:16px;padding:18px 20px;margin-bottom:22px;position:relative;overflow:hidden">
      <div style="position:absolute;top:-10px;right:-10px;font-size:60px;opacity:.08">${currentSection.emoji}</div>
      <div style="color:${col};font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase">${currentSection.name} · Chapter ${idx+1}</div>
      <h2 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1.35">${currentChapter.emoji} ${currentChapter.title}</h2>
    </div>
    ${currentChapter.notes.map((n,i) => `
    <div class="fade-in" style="background:#0f1035;border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:20px;margin-bottom:14px">
      <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px">
        <div style="font-size:30px">${n.emoji}</div>
        <div>
          <div style="color:#ffffff;font-size:11px;margin-bottom:2px">Point ${i+1}</div>
          <h3 style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:${col}">${n.heading}</h3>
        </div>
      </div>
      <p style="color:#ffffff;font-size:15px;line-height:1.85;margin-bottom:14px;color:#ffffff">${n.content}</p>
      <div style="background:${col}15;border:1px solid ${currentSection.border};border-radius:10px;padding:10px 14px;font-size:13px;color:#ffffff">
        <span style="color:${col};font-weight:700">💡 </span>${n.key}
      </div>
    </div>`).join('')}
    <button class="btn" onclick="startQuiz()" style="width:100%;background:linear-gradient(135deg,${col},${col}88);color:#fff;border:none;border-radius:14px;padding:16px;font-weight:800;font-size:16px;font-family:'Syne',sans-serif;margin-top:8px">
      🧠 Quiz Start Karo! (${currentChapter.quiz.length} Questions)
    </button>`;
  showPage('chapter');
}

function startQuiz() {
  currentQuiz = currentChapter.quiz;
  quizIdx = 0; score = 0; selectedAns = null; answers = [];
  renderQuiz();
  showPage('quiz');
}

function renderQuiz() {
  const q = currentQuiz[quizIdx];
  const col = currentSection.color;
  const pct = ((quizIdx + (selectedAns !== null ? 1 : 0)) / currentQuiz.length) * 100;
  document.getElementById('quizContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="color:${col};font-weight:700;font-size:14px">Q ${quizIdx+1} / ${currentQuiz.length}</span>
      <span style="color:#ffffff;font-size:13px">Score: ${score}</span>
    </div>
    <div class="progress-bar"><div style="height:100%;background:linear-gradient(90deg,${col},${col}88);border-radius:10px;width:${pct}%;transition:width .4s"></div></div>
    <div style="background:#111238;border:1px solid ${currentSection.border};border-radius:16px;padding:22px;margin-bottom:18px">
      <div style="font-size:28px;text-align:center;margin-bottom:10px">🤔</div>
      <p style="font-size:16px;font-weight:600;text-align:center;line-height:1.6;color:#ffffff">${q.q}</p>
    </div>
    ${q.options.map((opt, i) => {
      let bg = '#0f1035', border = 'rgba(255,255,255,.3)', color = '#fff', icon = '';
      if (selectedAns !== null) {
        if (i === q.ans) { bg='rgba(0,200,100,.12)'; border='#00C864'; color='#00C864'; icon=' ✅'; }
        else if (i === selectedAns) { bg='rgba(255,80,80,.12)'; border='#FF5050'; color='#FF5050'; icon=' ❌'; }
      }
      return `<button class="opt" onclick="handleAnswer(${i})" style="background:${bg};border-color:${border};color:${color};margin-bottom:10px"><span style="margin-right:10px;opacity:.6;font-weight:700">${['A','B','C','D'][i]}.</span>${opt}${icon}</button>`;
    }).join('')}
    ${selectedAns !== null ? `
      <div style="background:${answers[answers.length-1]?.correct?'rgba(0,200,100,.08)':'rgba(255,80,80,.08)'};border:1px solid ${answers[answers.length-1]?.correct?'rgba(0,200,100,.25)':'rgba(255,80,80,.25)'};border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:#ffffff;line-height:1.6">
        💡 ${q.explanation}
      </div>
      <button class="btn" onclick="nextQuestion()" style="width:100%;background:linear-gradient(135deg,${col},${col}88);color:#fff;border:none;border-radius:13px;padding:14px;font-weight:700;font-size:15px">
        ${quizIdx+1 < currentQuiz.length ? 'Agla Sawaal →' : 'Result Dekho 🎯'}
      </button>` : ''}`;
}

function handleAnswer(idx) {
  if (selectedAns !== null) return;
  selectedAns = idx;
  const correct = idx === currentQuiz[quizIdx].ans;
  if (correct) score++;
  answers.push({ selected: idx, correct });
  renderQuiz();
}

function nextQuestion() {
  if (quizIdx + 1 < currentQuiz.length) {
    quizIdx++; selectedAns = null;
    renderQuiz();
  } else {
    showResult();
  }
}

function showResult() {
  const key = `${currentSection.id}-${currentChapter._idx}`;
  completed[key] = true;
  localStorage.setItem('aiguru_done', JSON.stringify(completed));
  const col = currentSection.color;
  const pct = Math.round((score / currentQuiz.length) * 100);
  const msg = pct>=75?'🏆 Ekdum Zabardast!':pct>=50?'😊 Achha Kiya!':'📚 Thoda Aur Padho!';
  document.getElementById('resultContent').innerHTML = `
    <div style="text-align:center">
      <div style="font-size:60px;margin-bottom:14px;animation:float 3s ease-in-out infinite">${pct>=75?'🏆':pct>=50?'😊':'📚'}</div>
      <h2 style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:8px">${msg}</h2>
      <div style="font-size:52px;font-weight:900;font-family:'Syne',sans-serif;color:${col};margin:14px 0">${score}/${currentQuiz.length}</div>
      <div style="color:#ffffff;font-size:14px;margin-bottom:28px">${pct}% Score</div>
      <div style="margin-bottom:28px;text-align:left">
        ${answers.map((a,i) => `
          <div style="background:${a.correct?'rgba(0,200,100,.07)':'rgba(255,80,80,.07)'};border:1px solid ${a.correct?'rgba(0,200,100,.2)':'rgba(255,80,80,.2)'};border-radius:12px;padding:12px 14px;margin-bottom:10px">
            <div style="font-size:12px;color:#ffffff;margin-bottom:3px">Q${i+1}: ${currentQuiz[i].q}</div>
            <div style="font-size:13px;font-weight:600;color:${a.correct?'#00C864':'#FF5050'}">${a.correct?'✅ Sahi!':'❌ Galat — Sahi: '+currentQuiz[i].options[currentQuiz[i].ans]}</div>
          </div>`).join('')}
      </div>
      <div style="display:grid;gap:10px">
        <button class="btn" onclick="openChapter(${currentChapter._idx})" style="background:#141440;color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:13px;padding:13px;font-weight:600;font-size:14px">📖 Notes Dobara Padho</button>
        <button class="btn" onclick="showPage('section')" style="background:linear-gradient(135deg,${col},${col}88);color:#fff;border:none;border-radius:13px;padding:13px;font-weight:700;font-size:14px">📚 Aur Chapters Dekho</button>
        <button class="btn" onclick="showPage('home')" style="background:#0f1035;color:#ffffff;border:1px solid rgba(255,255,255,.18);border-radius:13px;padding:12px;font-weight:500;font-size:13px">🏠 Home</button>
      </div>
    </div>`;
  showPage('result');
  updateProgress();
}

// Build home section cards
function buildHome() {
  const grid = document.getElementById('sectionGrid');
  grid.innerHTML = DATA.sections.map(s => {
    const done = Object.keys(completed).filter(k => k.startsWith(s.id)).length;
    return `<div class="hov" onclick="openSection('${s.id}')" style="background:${s.bg};border:1px solid ${s.border};border-radius:18px;padding:22px 18px;position:relative;overflow:hidden;cursor:pointer">
      <div style="position:absolute;top:-20px;right:-20px;font-size:80px;opacity:.07">${s.emoji}</div>
      <div style="font-size:32px;margin-bottom:10px">${s.emoji}</div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:${s.color};margin-bottom:4px">${s.name}</div>
      <div style="color:#ffffff;font-size:12px;margin-bottom:10px">${s.desc}</div>
      <span style="background:${s.color}22;color:${s.color};border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600">${s.chapters.length} chapters</span>
      ${done>0?`<span style="background:rgba(0,200,100,.15);color:#00C864;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;margin-left:6px">✅ ${done} done</span>`:''}
    </div>`;
  }).join('');
  updateProgress();
}

buildHome();
</script>
